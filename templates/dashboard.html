{% extends 'base.html' %}{% block content %}<h1 class='main-title'>Dashboard</h1><table class='table table-bordered'><tr><th>ID</th><th>Task</th><th>Deadline</th><th>Subject</th><th>Actions</th></tr>{% for task in tasks %}<tr><td>{{ task.id }}</td><td>{{ task.title }}</td><td>{{ task.deadline }}</td><td>{{ task.subject_name }}</td><td><a href='/edit/{{ task.id }}' class='btn btn-warning btn-sm'>Edit</a><a href='/delete/{{ task.id }}' class='btn btn-danger btn-sm'>Delete</a></td></tr>{% endfor %}</table>{% endblock %}
