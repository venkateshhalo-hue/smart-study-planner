{% extends 'base.html' %}{% block content %}<div class='card-box'><h2>Add Task</h2><form method='POST'><input type='text' name='title' class='form-control mb-3' placeholder='Task Title' required><input type='date' name='deadline' class='form-control mb-3' required><select name='subject_id' class='form-control mb-3'>{% for subject in subjects %}<option value='{{ subject.id }}'>{{ subject.subject_name }}</option>{% endfor %}</select><button class='btn btn-success'>Add Task</button></form></div>{% endblock %}
